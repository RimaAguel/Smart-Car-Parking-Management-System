<!DOCTYPE HTML>
<html>
<head>
  <title>Parking Information</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" href="data:,">
  <style>
    html {
      font-family: Arial; 
      display: inline-block; 
      text-align: center;
    }
    body {  
      margin: 0;
      background-color: #f0f0f0; /* Background color for the body */
    }
    .topnav { 
      overflow: hidden; 
      background-color: #50B8B4; 
      color: white; 
      font-size: 1.5rem; /* Increased font size for the heading */
      padding: 20px; /* Added padding for better spacing */
    }
    .content { 
      padding: 20px; 
    }
    .card { 
      background-color: white; 
      box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2); /* Updated box shadow */
      transition: 0.3s; /* Added transition effect */
      border-radius: 10px; /* Added border radius for rounded corners */
      padding: 20px; /* Added padding for better spacing */
    }
    .cards { 
      max-width: 800px; 
      margin: 0 auto; 
      display: grid; 
      grid-gap: 20px; /* Increased grid gap for better separation */
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* Adjusted grid template columns */
    }
    .reading { 
      font-size: 1.6rem;  /* Increased font size for the reading */
      font-weight: bold; /* Added bold font weight */
    }
    .card p {
      margin-top: 15px; /* Added margin-top for better spacing between paragraphs */
    }
    .card i {
      font-size: 3rem; /* Increased font size for the icons */
      margin-bottom: 10px; /* Added margin-bottom for better spacing */
    }
  </style>
</head>
<body>
  <div class="topnav">
    <h1>Parking Information</h1>
  </div>
  <div class="content">
    <div class="cards">
      <div class="card">
        <i class="fas fa-parking" style="color:#059e8a;"></i>
        <p>Parking Status</p>
        <p class="reading" id="parkingStatus">%PARKING_STATUS%</p>
      </div>
      <div class="card">
        <i class="fas fa-car" style="color:#00add6;"></i>
        <p>Occupied Spaces</p>
        <p class="reading" id="occupiedSpaces">%OCCUPIED_SPACES%</p>
      </div>
      <div class="card">
        <i class="fas fa-check-circle" style="color:#e1e437;"></i>
        <p>Available Spaces</p>
        <p class="reading" id="availableSpaces">%AVAILABLE_SPACES%</p>
      </div>
    </div>
  </div>
<script>
if (!!window.EventSource) {
  var source = new EventSource('/events');

  source.addEventListener('open', function(e) {
    console.log("Events Connected");
  }, false);

  source.addEventListener('error', function(e) {
    if (e.target.readyState != EventSource.OPEN) {
      console.log("Events Disconnected");
    }
  }, false);

  source.addEventListener('message', function(e) {
    console.log("message", e.data);
  }, false);

  source.addEventListener('parkingStatus', function(e) {
    console.log("parkingStatus", e.data);
    document.getElementById("parkingStatus").innerHTML = e.data;
  }, false);

  source.addEventListener('occupiedSpaces', function(e) {
    console.log("occupiedSpaces", e.data);
    document.getElementById("occupiedSpaces").innerHTML = e.data;
  }, false);

  source.addEventListener('availableSpaces', function(e) {
    console.log("availableSpaces", e.data);
    document.getElementById("availableSpaces").innerHTML = e.data;
  }, false);
}
</script>
</body>
</html>
