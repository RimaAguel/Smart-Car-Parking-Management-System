<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Coming Soon - Start Bootstrap Theme</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&amp;display=swap" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)--></head>
<body>

    <div class="row " style="margin-top: 70px;padding: 40px;">
        <div class="col-lg-6 col-md-6 ">
        <div class="cover">
            <div class="input" style="background-image: url('assets\img\bg.jpg')" >     
            <div class="mb-3 " >
                <h2 style="padding: 20px;">Car Parking </h2>
                <form id="parking-form">
                <label for="inputPassword" class="col-sm-2 col-form-label" style="font-size: 20px;">FullName</label>
                <div class="col-sm-10">
                    <input type="text" class="fullName" id="name">
                </div>
                </div>
                <div class="mb-3">
                <label for="inputPassword" class="col-sm-2 col-form-label" style="font-size: 20px;">PlateNumber</label>
                <div class="col-sm-10">
                    <input type="number" class="plate-number" id="pl-num">
                </div>
                </div>

                <!-- Supprimer la section pour le bouton Color -->
                
                <div class="mb-3">
                <label for="inputPassword" class="col-sm-2 col-form-label" style="font-size: 20px;">PhoneNumber</label>
                <div class="col-sm-10">
                    <input type="tel" class="tel-num" id="telNum">
                </div>
                </div>
                <button type="button" class="btn btn-primary" id="btn"> Park </button>
            </form>
            </div>
        </div>
        </div>
        <div class="col-lg-6 col-md-6  card shadow-lg" style="background-color: white;">
        <table id="myTable" class="table table-striped   table-responsive">
            <thead>
            <tr>
                <th scope="col">Full Name</th>
                <th scope="col">Plate NUmber</th>
                <th scope="col">Color</th>
                <th scope="col">Phone Number</th>
                <th scope="col">Check in time</th>
                <th scope="col">Remove</th>
            </tr>
            </thead>
        </table>
        </div>
    </div>
</body>
</html>
